[build]
builder = "dockerfile"

[[services]]
name = "api"
source = "."
dockerfile = "apps/api/Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "web"
source = "."
dockerfile = "apps/web/Dockerfile"

[services.deploy]
restartPolicyType = "on_failure"
