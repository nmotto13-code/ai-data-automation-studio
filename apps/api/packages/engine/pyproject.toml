[project]
name = "adas-engine"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.0.0",
    "openpyxl>=3.1.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adas_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
