services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adas
      POSTGRES_USER: adas
      POSTGRES_PASSWORD: adas_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://adas:adas_dev_password@postgres:5432/adas
      STORAGE_ROOT: /data/storage
    volumes:
      - ./storage:/data/storage
    depends_on:
      - postgres

volumes:
  postgres_data:
